services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fitness_user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8181:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data

  config-server:
    build: ./configserver
    ports:
      - "8888:8888"

  eureka:
    build: ./eureka
    ports:
      - "8761:8761"
    depends_on:
      - config-server
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/

  user-service:
    build: ./userservice
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - eureka
      - config-server
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fitness_user_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root

  activity-service:
    build: ./activityservice
    ports:
      - "8082:8082"
    depends_on:
      - mongodb
      - rabbitmq
      - eureka
      - config-server
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
      MONGODB_URI: mongodb://mongodb:27017/fitnessactivity
      SPRING_RABBITMQ_HOST: rabbitmq

  ai-service:
    build: ./aiservice
    ports:
      - "8083:8083"
    depends_on:
      - mongodb
      - rabbitmq
      - eureka
      - config-server
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
      MONGODB_URI: mongodb://mongodb:27017/fitnessrecommendation
      SPRING_RABBITMQ_HOST: rabbitmq
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_API_URL: ${GROQ_API_URL:-}

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka
      - config-server
      - keycloak
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/fitness-oauth2/protocol/openid-connect/certs

  frontend:
    build:
      context: ./fitness-app-frontend
      args:
        VITE_API_URL: http://localhost:8080
        VITE_KEYCLOAK_URL: http://localhost:8181
    ports:
      - "5173:80"
    depends_on:
      - gateway

volumes:
  postgres_data:
  mongo_data:
  keycloak_data:
